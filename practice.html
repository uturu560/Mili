  <div class="rainbow-wrap">
    <div class="map-outer">
      <div class="start-overlay" id="start-overlay">
        <button type="button" class="btn-start" id="btn-start">START</button>
      </div>
      <iframe id="map-frame" src="map.html" title="Nigeria map"></iframe>
    </div>
  </div>

  <section class="game-over-section" id="game-over">
    <p class="game-over-text">Game over...</p>
    <p class="game-id" id="game-id">Practice #1</p>
    <div class="game-over-btns">
      <button type="button" class="btn-results" id="btn-results">RESULTS</button>
      <button type="button" class="btn-play-again" id="btn-play-again">PLAY AGAIN</button>
    </div>
    <div class="results-facts" id="results-facts"></div>
    <div class="share-score-wrap" id="share-score-wrap">
      <p class="share-score-label">Share your score</p>
      <div class="share-btns">
        <button type="button" class="btn-copy-score" id="btn-copy-score" aria-label="Copy score to clipboard">Copy</button>
        <a href="#" class="btn-share-whatsapp" id="btn-share-whatsapp" target="_blank" rel="noopener" aria-label="Share on WhatsApp">WhatsApp</a>
        <a href="#" class="btn-share-facebook" id="btn-share-facebook" target="_blank" rel="noopener" aria-label="Share on Facebook">Facebook</a>
        <a href="#" class="btn-share-twitter" id="btn-share-twitter" target="_blank" rel="noopener" aria-label="Share on Twitter">Twitter</a>
      </div>
    </div>
  </section>

  <div class="hints-section" id="hints-section">
    <h3>Hints (1 revealed at start; each wrong guess reveals another)</h3>
    <div class="hints-grid" id="hints-grid"></div>
  </div>

  <script>
    (function () {
      var STATE_CAPITALS = {
        'Abia': 'Umuahia', 'Adamawa': 'Yola', 'Akwa Ibom': 'Uyo', 'Anambra': 'Awka',
        'Bauchi': 'Bauchi', 'Bayelsa': 'Yenagoa', 'Benue': 'Makurdi', 'Borno': 'Maiduguri',
        'Cross River': 'Calabar', 'Delta': 'Asaba', 'Ebonyi': 'Abakaliki', 'Edo': 'Benin City',
        'Ekiti': 'Ado-Ekiti', 'Enugu': 'Enugu', 'Federal Capital Territory': 'Abuja',
        'Gombe': 'Gombe', 'Imo': 'Owerri', 'Jigawa': 'Dutse', 'Kaduna': 'Kaduna', 'Kano': 'Kano',
        'Katsina': 'Katsina', 'Kebbi': 'Birnin Kebbi', 'Kogi': 'Lokoja', 'Kwara': 'Ilorin',
        'Lagos': 'Ikeja', 'Nassarawa': 'Lafia', 'Niger': 'Minna', 'Ogun': 'Abeokuta',
        'Ondo': 'Akure', 'Osun': 'Oshogbo', 'Oyo': 'Ibadan', 'Plateau': 'Jos',
        'Rivers': 'Port Harcourt', 'Sokoto': 'Sokoto', 'Taraba': 'Jalingo',
        'Yobe': 'Damaturu', 'Zamfara': 'Gusau'
      };
      var STATE_REGIONS = {
        'Abia': 'South-East', 'Adamawa': 'North-East', 'Akwa Ibom': 'South-South', 'Anambra': 'South-East',
        'Bauchi': 'North-East', 'Bayelsa': 'South-South', 'Benue': 'North-Central', 'Borno': 'North-East',
        'Cross River': 'South-South', 'Delta': 'South-South', 'Ebonyi': 'South-East', 'Edo': 'South-South',
        'Ekiti': 'South-West', 'Enugu': 'South-East', 'Federal Capital Territory': 'North-Central',
        'Gombe': 'North-East', 'Imo': 'South-East', 'Jigawa': 'North-West', 'Kaduna': 'North-West', 'Kano': 'North-West',
        'Katsina': 'North-West', 'Kebbi': 'North-West', 'Kogi': 'North-Central', 'Kwara': 'North-Central',
        'Lagos': 'South-West', 'Nassarawa': 'North-Central', 'Niger': 'North-Central', 'Ogun': 'South-West',
        'Ondo': 'South-West', 'Osun': 'South-West', 'Oyo': 'South-West', 'Plateau': 'North-Central',
        'Rivers': 'South-South', 'Sokoto': 'North-West', 'Taraba': 'North-East',
        'Yobe': 'North-East', 'Zamfara': 'North-West'
      };
      var STATE_POPULATION_OVER_10M = {
        'Abia': false, 'Adamawa': false, 'Akwa Ibom': false, 'Anambra': false,
        'Bauchi': false, 'Bayelsa': false, 'Benue': true, 'Borno': false,
        'Cross River': false, 'Delta': false, 'Ebonyi': false, 'Edo': false,
        'Ekiti': false, 'Enugu': false, 'Federal Capital Territory': false,
        'Gombe': false, 'Imo': false, 'Jigawa': false, 'Kaduna': true, 'Kano': true,
        'Katsina': true, 'Kebbi': false, 'Kogi': false, 'Kwara': false,
        'Lagos': true, 'Nassarawa': false, 'Niger': false, 'Ogun': false,
        'Ondo': false, 'Osun': false, 'Oyo': true, 'Plateau': false,
        'Rivers': true, 'Sokoto': false, 'Taraba': false,
        'Yobe': false, 'Zamfara': false
      };
      var STATE_LANGUAGES = {
        'Abia': 'Igbo', 'Adamawa': 'Hausa, Fulfulde', 'Akwa Ibom': 'Ibibio, Efik', 'Anambra': 'Igbo',
        'Bauchi': 'Hausa', 'Bayelsa': 'Ijaw', 'Benue': 'Tiv, Idoma', 'Borno': 'Kanuri, Hausa',
        'Cross River': 'Efik, Ejagham', 'Delta': 'Urhobo, Itsekiri', 'Ebonyi': 'Igbo', 'Edo': 'Edo',
        'Ekiti': 'Yoruba', 'Enugu': 'Igbo', 'Federal Capital Territory': 'Hausa, Gbagyi',
        'Gombe': 'Hausa', 'Imo': 'Igbo', 'Jigawa': 'Hausa', 'Kaduna': 'Hausa', 'Kano': 'Hausa',
        'Katsina': 'Hausa', 'Kebbi': 'Hausa', 'Kogi': 'Igala, Ebira', 'Kwara': 'Yoruba, Hausa',
        'Lagos': 'Yoruba', 'Nassarawa': 'Hausa, Eggon', 'Niger': 'Hausa, Nupe', 'Ogun': 'Yoruba',
        'Ondo': 'Yoruba', 'Osun': 'Yoruba', 'Oyo': 'Yoruba', 'Plateau': 'Berom, Hausa',
        'Rivers': 'Ikwerre, Ijaw', 'Sokoto': 'Hausa', 'Taraba': 'Jukun, Hausa',
        'Yobe': 'Kanuri, Hausa', 'Zamfara': 'Hausa'
      };
      var STATE_FOOD = {
        'Abia': 'Abacha, Ukwa', 'Adamawa': 'Masa, Tuwo', 'Akwa Ibom': 'Edikang ikong, Afang', 'Anambra': 'Ofe onugbu, Fio fio',
        'Bauchi': 'Tuwo, Miyan kuka', 'Bayelsa': 'Banga soup, Starch', 'Benue': 'Pounded yam, Beniseed soup', 'Borno': 'Tuwo, Dama',
        'Cross River': 'Edikang ikong, Afang', 'Delta': 'Banga soup, Starch', 'Ebonyi': 'Okpa, Abacha', 'Edo': 'Pounded yam, Owo soup',
        'Ekiti': 'Pounded yam, Eba', 'Enugu': 'Ofe nsala, Abacha', 'Federal Capital Territory': 'Tuwo, various',
        'Gombe': 'Tuwo, Fura da nono', 'Imo': 'Ofe Owerri, Abacha', 'Jigawa': 'Tuwo, Dambu', 'Kaduna': 'Tuwo, Masa',
        'Kano': 'Tuwo, Fura da nono', 'Katsina': 'Tuwo, Dambu', 'Kebbi': 'Tuwo, Masa', 'Kogi': 'Pounded yam, Eba',
        'Kwara': 'Amala, Eba', 'Lagos': 'Eba, Amala, Jollof', 'Nassarawa': 'Tuwo, Pounded yam', 'Niger': 'Tuwo, Daddawa',
        'Ogun': 'Amala, Eba', 'Ondo': 'Pounded yam, Eba', 'Osun': 'Amala, Iyan', 'Oyo': 'Amala, Eba',
        'Plateau': 'Pounded yam, Tuwo', 'Rivers': 'Banga soup, Pepper soup', 'Sokoto': 'Tuwo, Fura',
        'Taraba': 'Pounded yam, Tuwo', 'Yobe': 'Tuwo, Fura', 'Zamfara': 'Tuwo, Dambu'
      };
      var STATE_GOVERNOR = {
        'Abia': 'Alex Otti', 'Adamawa': 'Ahmadu Fintiri', 'Akwa Ibom': 'Umo Eno', 'Anambra': 'Charles Soludo',
        'Bauchi': 'Bala Mohammed', 'Bayelsa': 'Douye Diri', 'Benue': 'Hyacinth Alia', 'Borno': 'Babagana Zulum',
        'Cross River': 'Bassey Otu', 'Delta': 'Sheriff Oborevwori', 'Ebonyi': 'Francis Nwifuru', 'Edo': 'Godwin Obaseki',
        'Ekiti': 'Biodun Oyebamiji', 'Enugu': 'Peter Mbah', 'Federal Capital Territory': 'Nyesom Wike',
        'Gombe': 'Inuwa Yahaya', 'Imo': 'Hope Uzodinma', 'Jigawa': 'Umar Namadi', 'Kaduna': 'Uba Sani',
        'Kano': 'Abba Kabir Yusuf', 'Katsina': 'Dikko Radda', 'Kebbi': 'Nasir Idris', 'Kogi': 'Ahmed Ododo',
        'Kwara': 'Abdulrahman Abdulrazaq', 'Lagos': 'Babajide Sanwo-Olu', 'Nassarawa': 'Abdullahi Sule',
        'Niger': 'Umar Bago', 'Ogun': 'Dapo Abiodun', 'Ondo': 'Lucky Aiyedatiwa', 'Osun': 'Ademola Adeleke',
        'Oyo': 'Seyi Makinde', 'Plateau': 'Caleb Mutfwang', 'Rivers': 'Siminalayi Fubara', 'Sokoto': 'Ahmad Aliyu',
        'Taraba': 'Agbu Kefas', 'Yobe': 'Mai Mala Buni', 'Zamfara': 'Dauda Lawal'
      };
      var STATE_NAMES = Object.keys(STATE_CAPITALS);
      var NUM_HINTS = 11;
      var hintOrder = [];

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      function getHint(state, n) {
        var capital = STATE_CAPITALS[state] || '';
        var region = STATE_REGIONS[state] || '';
        var words = state.split(/\s+/).length;
        var first = state.charAt(0);
        var last = state.charAt(state.length - 1);
        var capFirst = capital.charAt(0);
        var capLast = capital.charAt(capital.length - 1);
        var over10m = STATE_POPULATION_OVER_10M[state] !== false;
        var languages = STATE_LANGUAGES[state] || '—';
        var food = STATE_FOOD[state] || '—';
        var governor = STATE_GOVERNOR[state] || '—';
        switch (n) {
          case 1: return 'Its population is <span class="hint-highlight">' + (over10m ? 'more' : 'less') + ' than 10 million</span>.';
          case 2: return 'It has <span class="hint-highlight">' + words + ' word(s)</span> in its name.';
          case 3: return 'The state\'s name starts with "<span class="hint-highlight">' + first + '</span>".';
          case 4: return 'The state\'s name ends with "<span class="hint-highlight">' + last + '</span>".';
          case 5: return 'Its capital has <span class="hint-highlight">' + capital.length + ' letters</span>.';
          case 6: return 'Its capital starts with "<span class="hint-highlight">' + capFirst + '</span>".';
          case 7: return 'The state is in <span class="hint-highlight alt">' + region + '</span>.';
          case 8: return 'Its capital ends with "<span class="hint-highlight">' + capLast + '</span>".';
          case 9: return 'Languages widely spoken include <span class="hint-highlight alt">' + languages + '</span>.';
          case 10: return 'Local foods include <span class="hint-highlight alt">' + food + '</span>.';
          case 11: return 'Current governor is <span class="hint-highlight alt">' + governor + '</span>.';
          default: return '—';
        }
      }
      var LIVES = 11;
      var gameId = 1;
      var targetState = null;
      var livesLeft = LIVES;
      var timerStart = null;
      var timerInterval = null;
      var wrongGuesses = [];

      var heartsEl = document.getElementById('hearts');
      var timerEl = document.getElementById('timer');
      var startOverlay = document.getElementById('start-overlay');
      var btnStart = document.getElementById('btn-start');
      var mapFrame = document.getElementById('map-frame');
      var gameOverSection = document.getElementById('game-over');
      var gameIdEl = document.getElementById('game-id');
      var btnResults = document.getElementById('btn-results');
      var resultsFacts = document.getElementById('results-facts');
      var lastShareResult = null;
      var SHARE_BASE_URL = 'https://www.mili.website';
      function getShareText() {
        if (!lastShareResult) return 'Can you guess the state? Play Mili at ' + SHARE_BASE_URL;
        var r = lastShareResult;
        var timeStr = r.elapsedSec != null ? formatElapsed(r.elapsedSec) : '—';
        var hintsUsed = 1 + (r.wrongCount || 0);
        var lines = [
          'Mili #' + r.gameId,
          '\u23F1\uFE0F ' + timeStr,
          '\uD83D\uDCA1 Hints used: ' + hintsUsed + '/10',
          r.won ? '\uD83D\uDD25 Got it!' : '\u274C Didn\'t get it'
        ];
        return lines.join('\n') + '\n' + SHARE_BASE_URL;
      }
      function formatElapsed(sec) {
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return (m ? m + ':' : '') + (s < 10 && m ? '0' : '') + s + (m ? '' : 's');
      }
      function copyShareText() {
        var text = getShareText();
        var btn = document.getElementById('btn-copy-score');
        function done() {
          if (btn) { btn.textContent = 'Copied!'; setTimeout(function () { if (btn) btn.textContent = 'Copy'; }, 2000); }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopy(text, done); });
        } else { fallbackCopy(text, done); }
      }
      function fallbackCopy(text, done) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          if (done) done();
        } catch (e) {}
        document.body.removeChild(ta);
      }
      function shareViaWhatsApp() {
        window.open('https://wa.me/?text=' + encodeURIComponent(getShareText()), '_blank', 'noopener');
      }
      function shareViaFacebook() {
        window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(SHARE_BASE_URL) + '&quote=' + encodeURIComponent(getShareText()), '_blank', 'noopener');
      }
      function shareViaTwitter() {
        window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(getShareText()), '_blank', 'noopener');
      }
      var btnPlayAgain = document.getElementById('btn-play-again');
      var hintsGridEl = document.getElementById('hints-grid');
      var mobileOverlay = document.getElementById('mobile-map-overlay');
      var mobileOverlayInner = document.getElementById('mobile-map-inner');
      var mobileHintsBar = document.getElementById('mobile-hints-bar');
      var mobileHintsContent = document.getElementById('mobile-hints-content');
      var topBarWrap = document.getElementById('top-bar-wrap');

      function renderHearts() {
        heartsEl.innerHTML = '';
        for (var i = 0; i < LIVES; i++) {
          var span = document.createElement('span');
          span.textContent = '\u2665';
          if (i >= livesLeft) span.classList.add('lost');
          heartsEl.appendChild(span);
        }
      }

      function getRevealedHintCount() {
        return Math.min(1 + wrongGuesses.length, NUM_HINTS);
      }

      function renderHints() {
        if (!hintsGridEl || !targetState || hintOrder.length !== NUM_HINTS) return;
        hintsGridEl.innerHTML = '';
        var revealed = getRevealedHintCount();
        for (var i = 1; i <= NUM_HINTS; i++) {
          var slot = document.createElement('div');
          slot.className = 'hint-slot' + (i <= revealed ? ' revealed' : ' locked');
          var content = document.createElement('span');
          content.className = 'hint-content';
          var num = document.createElement('span');
          num.className = 'hint-num';
          num.textContent = i + '.';
          content.appendChild(num);
          var text = document.createElement('span');
          text.className = 'hint-text';
          if (i <= revealed) {
            text.innerHTML = getHint(targetState, hintOrder[i - 1]);
          }
          content.appendChild(text);
          slot.appendChild(content);
          hintsGridEl.appendChild(slot);
        }
        if (revealed > 0 && targetState && hintOrder.length === NUM_HINTS) {
          var currentHint = getHint(targetState, hintOrder[revealed - 1]);
          showMobileHint(currentHint);
        }
      }

      function startTimer() {
        timerStart = Date.now();
        timerInterval = setInterval(function () {
          var ms = Date.now() - timerStart;
          var sec = Math.floor(ms / 1000);
          var min = Math.floor(sec / 60);
          sec = sec % 60;
          var m = (ms % 1000);
          timerEl.textContent = (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec + '.' + (m < 100 ? '0' : '') + (m < 10 ? '0' : '') + Math.floor(m / 10);
        }, 10);
      }

      function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
      }

      function pickRandomState() {
        return STATE_NAMES[Math.floor(Math.random() * STATE_NAMES.length)];
      }

      function setPathFill(stateName, fill) {
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'set-fill', stateName: stateName, fill: fill }, '*');
        }
      }
      function resetMapColors() {
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'reset-map-colors' }, '*');
        }
      }

      function isMobile() {
        return window.innerWidth <= 768;
      }

      var mobileStartWrap = document.getElementById('mobile-start-wrap');
      function setupMobileMapOverlay() {
        if (!mobileOverlay || !mobileOverlayInner || !mapFrame) return;
        if (!isMobile()) {
          var outer = document.querySelector('.map-outer');
          if (outer) {
            if (mapFrame.parentNode !== outer) outer.appendChild(mapFrame);
            if (startOverlay && startOverlay.parentNode !== outer) outer.appendChild(startOverlay);
          }
          mobileOverlay.style.display = 'none';
          if (mobileStartWrap) {
            mobileStartWrap.style.display = 'none';
            mobileStartWrap.classList.remove('hidden');
          }
          if (topBarWrap) topBarWrap.classList.remove('minimized');
          return;
        }
        if (mapFrame.parentNode !== mobileOverlayInner) {
          mobileOverlayInner.appendChild(mapFrame);
        }
        mobileOverlay.style.display = 'flex';
        if (mobileStartWrap && startOverlay && startOverlay.parentNode !== mobileStartWrap) {
          mobileStartWrap.appendChild(startOverlay);
          mobileStartWrap.style.display = startOverlay.classList.contains('hidden') ? 'none' : 'flex';
        }
      }

      function showMobileHint(html) {
        if (!isMobile() || !mobileHintsBar || !mobileHintsContent) return;
        mobileHintsBar.classList.remove('minimized');
        mobileHintsContent.innerHTML = html || 'Hint';
        mobileHintsBar.classList.add('visible');
        if (showMobileHint._hideTimer) {
          clearTimeout(showMobileHint._hideTimer);
          showMobileHint._hideTimer = null;
        }
      }

      function showGameOver(won) {
        stopTimer();
        var elapsedMs = timerStart != null ? (Date.now() - timerStart) : 0;
        var elapsedSec = Math.floor(elapsedMs / 1000);
        lastShareResult = { mode: 'practice', gameId: gameId, won: won, wrongCount: wrongGuesses.length, elapsedSec: elapsedSec };
        gameOverSection.classList.add('visible');
        gameIdEl.textContent = 'Practice #' + gameId;
        var state = targetState;
        var capital = STATE_CAPITALS[state] || '—';
        resultsFacts.innerHTML =
          'Its capital is <span class="highlight">' + capital + '</span>.<br>' +
          'The state is <span class="highlight">' + state + '</span>.<br>' +
          (wrongGuesses.length ? 'Wrong guesses: <span class="highlight">' + wrongGuesses.join(', ') + '</span>.' : '');
        resultsFacts.style.display = 'block';
        if (won) setPathFill(state, '#00e676'); else setPathFill(state, '#9e4a4a');
      }

      function startGame() {
        targetState = pickRandomState();
        livesLeft = LIVES;
        wrongGuesses = [];
        var tier1 = shuffle([1, 2, 5, 7]);
        var tier2 = shuffle([3, 4, 6, 8]);
        var tier3 = shuffle([9, 10, 11]);
        hintOrder = tier1.concat(tier2).concat(tier3);
        gameOverSection.classList.remove('visible');
        resetMapColors();
        startOverlay.classList.add('hidden');
        if (mobileStartWrap) mobileStartWrap.style.display = 'none';
        if (isMobile() && topBarWrap) topBarWrap.classList.add('minimized');
        renderHearts();
        renderHints();
        startTimer();
        gameId++;
        var hintsSection = document.getElementById('hints-section');
        if (hintsSection) hintsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'start-game', targetState: targetState }, '*');
        }
      }

      function handleMapClick(stateName) {
        if (!targetState) return;
        if (stateName === targetState) {
          stopTimer();
          setPathFill(stateName, '#69f0ae');
          var elapsedMs = timerStart != null ? (Date.now() - timerStart) : 0;
          var elapsedSec = Math.floor(elapsedMs / 1000);
          var capital = STATE_CAPITALS[stateName] || '—';
          try {
            sessionStorage.setItem('mapgame_practice_pending_share', JSON.stringify({
              state: stateName,
              capital: capital,
              wrongGuesses: wrongGuesses.slice(),
              gameId: gameId,
              elapsedSec: elapsedSec
            }));
          } catch (e) {}
          window.location.href = 'https://omg10.com/4/10713611';
          return;
        }
        wrongGuesses.push(stateName);
        setPathFill(stateName, '#9e4a4a');
        livesLeft--;
        renderHearts();
        renderHints();
        var revealed = getRevealedHintCount();
        var slots = hintsGridEl.querySelectorAll('.hint-slot');
        if (slots[revealed - 1]) slots[revealed - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (livesLeft <= 0) showGameOver(false);
      }

      var btnMoon = document.getElementById('btn-moon');
      var THEME_KEY = 'mapgame_theme';
      function getTheme() {
        return document.documentElement.classList.contains('light-mode') ? 'light' : 'dark';
      }
      function sendThemeToMap() {
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'set-theme', theme: getTheme() }, '*');
        }
      }
      function applyTheme(theme) {
        var isLight = theme === 'light';
        document.documentElement.classList.toggle('light-mode', isLight);
        if (btnMoon) {
          btnMoon.textContent = isLight ? '\u2600' : '\uD83C\uDF19';
          btnMoon.title = isLight ? 'Light mode – click for dark' : 'Dark mode – click for light';
          btnMoon.setAttribute('aria-label', isLight ? 'Switch to dark mode' : 'Switch to light mode');
        }
        sendThemeToMap();
      }
      function toggleTheme() {
        var next = document.documentElement.classList.contains('light-mode') ? 'dark' : 'light';
        try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
        applyTheme(next);
      }
      (function initTheme() {
        var saved = 'dark';
        try { saved = localStorage.getItem(THEME_KEY) || 'dark'; } catch (e) {}
        applyTheme(saved);
      })();
      if (btnMoon) btnMoon.addEventListener('click', toggleTheme);
      mapFrame.addEventListener('load', sendThemeToMap);

      btnStart.addEventListener('click', function () {
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'ignore-next-mousedown' }, '*');
        }
        setTimeout(function () { startGame(); }, 0);
      });

      btnPlayAgain.addEventListener('click', function () {
        if (mapFrame && mapFrame.contentWindow) {
          mapFrame.contentWindow.postMessage({ type: 'ignore-next-mousedown' }, '*');
        }
        setTimeout(function () { startGame(); }, 0);
      });

      btnResults.addEventListener('click', function () {
        resultsFacts.style.display = resultsFacts.style.display === 'none' ? 'block' : 'none';
      });

      var btnCopyScore = document.getElementById('btn-copy-score');
      var btnShareWhatsapp = document.getElementById('btn-share-whatsapp');
      var btnShareFacebook = document.getElementById('btn-share-facebook');
      var btnShareTwitter = document.getElementById('btn-share-twitter');
      if (btnCopyScore) btnCopyScore.addEventListener('click', function (e) { e.preventDefault(); copyShareText(); });
      if (btnShareWhatsapp) {
        btnShareWhatsapp.addEventListener('click', function (e) {
          e.preventDefault();
          btnShareWhatsapp.href = 'https://wa.me/?text=' + encodeURIComponent(getShareText());
          shareViaWhatsApp();
        });
      }
      if (btnShareFacebook) {
        btnShareFacebook.addEventListener('click', function (e) {
          e.preventDefault();
          btnShareFacebook.href = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(SHARE_BASE_URL) + '&quote=' + encodeURIComponent(getShareText());
          shareViaFacebook();
        });
      }
      if (btnShareTwitter) {
        btnShareTwitter.addEventListener('click', function (e) {
          e.preventDefault();
          btnShareTwitter.href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(getShareText());
          shareViaTwitter();
        });
      }

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'map-click' && e.data.state) handleMapClick(e.data.state);
      });

      setupMobileMapOverlay();
      window.addEventListener('resize', setupMobileMapOverlay);

      if (topBarWrap) {
        topBarWrap.addEventListener('click', function (e) {
          if (isMobile() && topBarWrap.classList.contains('minimized')) {
            e.preventDefault();
            e.stopPropagation();
            topBarWrap.classList.remove('minimized');
          }
        });
      }
      var mobileHintsMinimize = document.getElementById('mobile-hints-minimize');
      if (mobileHintsMinimize && mobileHintsBar) {
        mobileHintsMinimize.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          mobileHintsBar.classList.add('minimized');
          mobileHintsBar.classList.add('visible');
        });
      }

      document.querySelectorAll('.mode-btns a[href="index.html"]').forEach(function (a) {
        a.addEventListener('click', function () { try { localStorage.setItem('mapgame_mode', 'daily'); } catch (e) {} });
      });

      function restorePendingPracticeResult() {
        try {
          var raw = sessionStorage.getItem('mapgame_practice_pending_share');
          if (!raw) return;
          var p = JSON.parse(raw);
          sessionStorage.removeItem('mapgame_practice_pending_share');
          lastShareResult = { mode: 'practice', gameId: p.gameId, won: true, wrongCount: (p.wrongGuesses && p.wrongGuesses.length) || 0, elapsedSec: p.elapsedSec };
          gameOverSection.classList.add('visible');
          gameIdEl.textContent = 'Practice #' + p.gameId;
          resultsFacts.innerHTML =
            'Its capital is <span class="highlight">' + (p.capital || '—') + '</span>.<br>' +
            'The state is <span class="highlight">' + (p.state || '—') + '</span>.<br>' +
            (p.wrongGuesses && p.wrongGuesses.length ? 'Wrong guesses: <span class="highlight">' + p.wrongGuesses.join(', ') + '</span>.' : '');
          resultsFacts.style.display = 'block';
          startOverlay.classList.add('hidden');
          if (mobileStartWrap) mobileStartWrap.style.display = 'none';
          setPathFill(p.state, '#00e676');
        } catch (e) {}
      }

      renderHearts();
      restorePendingPracticeResult();
    })();
  </script>
</body>
</html>
